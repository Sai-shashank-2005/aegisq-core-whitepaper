<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AegisQ Whitepaper</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <style>
    body {
      margin: 0;
      background: #0b0f19;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    .logo {
      width: 110px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 32px;
      font-weight: 600;
    }

    .subtitle {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .pdf-container {
      width: 90%;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
    }

    embed {
      width: 100%;
      height: 900px;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #6e7681;
    }

    .footer a {
      color: #58a6ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="AegisQ Logo">

    <!-- TITLE -->
    <h1>AegisQ Consensus Protocol — Whitepaper</h1>

    <!-- SUBTITLE -->
    <p class="subtitle">
      Deterministic Consensus • Adversarial Analysis • System-Level Design
    </p>

    <!-- PDF VIEW (WORKING) -->
    <div class="pdf-container">
      <embed 
        src="AegisQ_Consensus_Protocol_Whitepaper.pdf" 
        type="application/pdf">
    </div>

    <!-- FALLBACK -->
    <div class="footer">
      PDF not loading? 
      <a href="AegisQ_Consensus_Protocol_Whitepaper.pdf" target="_blank">
        Open directly
      </a>
    </div>

  </div>

</body>
</html>
